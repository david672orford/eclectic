{% include header.html %}
<main class="post">

<article>
<h1>{{ page.title }}</h2>
<div class="post-date">{{ page.date | date: site.date_format }}</div>
{{ content }}

{% if page.author %}
<div class="author-box">
  <img src="{{ site.authors[page.author]['photo'] }}">
  <div>
    <div class="author-byline">{{ page.author }}</div>
    <div class="author-blurb">
      {{ site.authors[page.author]['blurb'] }}
    </div>
  </div>
</div>
{% endif %}
<section id="comments">
</section>
<script type="module" src="{{ site.comments_script_url }}"></script>
</article>

</main>
{% include footer.html %}
