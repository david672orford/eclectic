{% include header.html %}
<main class="padded">
<h1>{{ page.title }}</h1>
<table>
<thead>
  <tr>
    <th>Date</th>
    <th>Title</th>
  </tr>
</thead>
<tbody>
{% for post in page.posts %}
  <tr>
    <td>{{ post.date | date: "%Y-%m-%d" }}</td>
    <td><a href="{{ post.url }}">{{ post.title }}</a></td>
  </tr>
{% endfor %}
</tbody>
</table>
</main>
{% include footer.html %}
