<nav class="sidebar" tabindex="0">
<div class="menu-button">
  <svg width="64" height="64" viewbox="0 0 64 64">
    <path d="M 8,16 H56"></path>
    <path d="M 8,32 H56"></path>
    <path d="M 8,48 H56"></path>
  </svg>
</div>
<div class="menu-scroller">
  <h2>Categories</h2>
  <ul>
  {% for category in site.categories %}
  <li>
    <a href="/category/{{ category[0] | slugify }}">
      {{ category[0] }}
    </a>
  </li>
  {% endfor %}
  </ul>

  <h2>Archives</h2>
  {% assign months = site.posts | group_by_exp:"post", "post.date | date: '%Y-%m'" %}
  <ul>
  {% for month in months %}
  <li>
    <a href="{{ month.items[0].date | date: "/%Y/%m/" }}">
      {{ month.name }}</a>
	({{ month.items | size }})
  </li>
  {% endfor %}
  </ul>
</div>
</nav>
