<!DOCTYPE html>
<html lang="{{ site.lang | default: "en-US" }}">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
{% seo %}
<link rel="stylesheet" href="{{ "/assets/styles/base.css?v=" | append: site.github.build_revision | relative_url }}">
{% if page.style %}
<style>{{page.style}}</style>
{% endif %}
</head>
<body>

<header>
  <h1><a href="{{ "/" | absolute_url }}">{{ site.title }}</a></h1>
  {% if page.banner_image %}
  <div class="banner-image">
    <div>
      <div>
        <img src="{{ page.banner_image }}" alt="{{ page.banner_image_alt }}">
        {% if page.banner_image_credit %}
        <span>{{ page.banner_image_credit }}</span>
        {% endif %}
      </div>
    </div>
  </div>
  {% endif %}
</header>

<main>
