<figure class="float {% if include.side %}{{include.side}}{% else %}right{% endif %}{% if include.width and include.width < include.height %} portrait{% endif %}">
  <a href="/files/{{include.file}}">
    <img src="/files/{{include.file}}" alt="{{include.alt|escape}}">
  </a>
  <figcaption>{{include.caption | safe}}</figcaption>
</figure>
