---
layout: page
---
<h1>Categories</h1>
{% for category in site.categories %}
<section>
<h2><a href="/category/{{ category[0] }}">{{ category[0] }}</a></h2>
<ul>
  {% for post in category[1] %}
  <li>
    <a href="{{ post.url }}">{{ post.title }}</a>
  </li>
  {% endfor %}
</ul>
</section>
{% endfor %}
