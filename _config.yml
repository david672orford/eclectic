title: Eclectic
description: Language, computing, and other topics
permalink: /:year/:month/:day/:title
copyright: "© 2008—2026 David Chappell"
date_format: "%Y-%m-%d"
authors:
  "David Chappell":
    photo: /assets/images/author.jpg
    blurb: >
      A computer programmer with {{ "now" | date: "%Y" | minus: 1990 }} years
      of experience working with Internet technology and developing opensource software
      His interests include electronics, language, and the philosophy and history
      of science.
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      author: "David Chappell" 
      excerpt_separator: <!--more-->
plugins:
  - jekyll-paginate
  - jekyll-archives
paginate: 5
paginate_path: "/page/:num/"
jekyll-archives:
  enabled: ["categories", "month", "year"]
  category: "/category/:name/"
  year: "/:year/"
  month: "/:year/:month/"
  layout: archive
google_analytics: "G-4ZKR534XQD"
comments_script_url: "https://comments.eclectic.trincoll.edu/comments.js"
